body:
  text: 大唐總持寺沙門釋智通譯如是我聞一時婆伽婆在王舍城耆闍崛山與大比丘衆五百人俱菩薩無央數爾時觀世音菩薩與九十二俱胝菩薩同座時觀世音菩薩於晨朝從坐而起整衣服合掌恭敬頭面禮佛而白佛言世尊我欲説普賢陀羅尼為憐愍利益一切衆生故我從過去月光佛所受得此呪今欲對佛説此陀羅尼唯願世尊聽我説之即説呪曰那謨遏羅上怛那二合跢囉二合夜耶一那謨阿利耶婆路枳羝攝皤二合羅去耶二菩提薩埵去耶三摩訶薩埵耶去四摩訶迦去嚧儞迦去耶五跢姪他六佉伽去鞞七佉伽去鞞八佉伽去鞞九者芻佉鞞十輸嚕二合跢囉二合佉鞞十一伽羅二合上拏佉鞞十二是訶皤二合佉鞞十三迦去耶佉鞞十四摩那上佉鞞十五薩囉上佉鞞十六鞞麼佉鞞十七輸上若佉鞞十八儞弭上跢佉鞞十九波囉二合上音尼陀那去上佉鞞二十娑摩去地上佉鞞二十一波羅弭上多佉鞞二十二菩提去佉鞞二十三娑上囉去娑囉娑羅二十四薩婆勃陀地上瑟恥二合提二十五婆囉婆囉婆囉二十六達囉摩二合地上瑟恥二合提二十七迦羅上迦羅迦羅二十八僧伽地瑟恥二合提二十九那謨阿利耶婆路枳帝攝皤二合羅去耶三十菩提薩埵耶三十一摩訶薩埵去耶三十二摩訶迦去魯尼迦去耶三十三那謨薩埵去那皤地上喃三十四菩提薩埵俱胝去喃上三十五阿地瑟恥二合漢都摩二合受持者自稱名字三十六阿誘囉皤二合濫者三十七陀但都三十八跢姪他三十九素羅毗上素羅毗上四十摩訶素囉上比四十一母儞母儞四十二摩訶母儞四十三摩底摩底上四十四摩訶摩底上四十五那謨阿梨耶婆路枳羝攝皤二合囉去耶四十六菩提薩埵耶四十七摩訶薩埵去耶四十八摩訶迦去嚕尼上迦去耶四十九悉佃二合都娑二合曼上跢跋重音陀羅二合陀羅尼五十莎訶五十一已上根本呪也結界陀羅尼呪曰那謨喝囉上怛那二合跢羅二合夜耶一那上謨訶梨耶婆路枳羝攝皤二合囉去耶二菩去提薩埵去耶三摩訶薩埵去耶四摩訶迦去嚧尼迦去耶去五跢姪他六至里盤陀去弭上七弭里槃陀去弭上八至里弭上里槃陀弭上九似摩去槃陀弭上十似摩去摩迷迦上失質二合陀底上末羯囉二合摩都十一薩訶十二呪水二十一遍散灑十方即成結界此陀羅尼呪先須受持預前結界如我結界即得成就奉請陀羅尼曰納謨囉上怛那二合跢囉二合夜耶一那上謨訶梨耶婆路枳羝攝皤囉耶二菩提薩埵耶三摩訶薩埵去耶四摩訶迦嚕尼迦去耶五跢姪他六至里至里七弭上里弭上里八至里梨九醯上婆伽畔十阿梨耶婆路枳羝攝皤囉耶十一莎訶十二若欲請我如我所説心請已後從白月八日至十五日日日三時香湯洗浴著新淨衣日日三時時別各誦一百八遍呪至十五日倍勝供養誦無遍數即其夜半觀世音菩薩自來為現金色之身相好莊嚴種種光明放千種光爾時呪師心莫怖畏行者見已即得勝地陀羅尼三摩地已即見東方阿閦鞞佛南方寶相佛西方阿彌陀佛北方微妙聲佛見如是等十方無量諸佛如來光明色相捨此身已生淨佛土一切處佛之所讚歎已説普賢陀羅尼竟爾時觀世音菩薩説是呪已九十二俱胝菩薩皆得住阿毗跋致地及得見一切諸佛得聞正法得滅一切三障重罪得大功德如閻浮提履地微塵等數行者自身得種種功德莊嚴一切病苦及諸惡業並皆消滅又得捷疾辨又得自在心隨願悉滿得具足一切諸波羅蜜隨意往生十方淨土見一切諸佛聞説正法得首楞嚴等一切三昧又得七寶三摩提放光三摩提大海水三昧騰空三昧出沒三昧得如是等恆河沙等三昧又得無量大力陀羅尼門此呪功德與八十萬陀羅尼功德無異由此呪力令我得成如是法身又能利益一切衆生速得種種聰明辨才清淨法身由此呪力一聞總持永不忘失由此呪力我所放索所著之處一切衆生重罪消滅一切惡人及惡魔惡鬼惡神自然降伏消滅一切衆生聞此呪名及受持者永不墮地獄餓鬼畜生佛言善哉善哉汝此呪力若有四衆能受持者所得功德及其威力如我無異爾時觀世音菩薩説是呪時三千大千世界六種震動上至阿迦膩吒天其中所有一切天龍夜叉一切鬼神人非人等悉恐怖不安身毛皆竪讚言善哉此呪神力不可思議一切衆生皆蒙利益時觀世音菩薩復白佛言願佛證知善哉一切四衆於我所説呪悉皆用心受持恭敬供養爾時觀世音菩薩白佛言我今受持此呪一切大地六種震動一切衆生及諸天龍悉皆忙怕此呪神力不可思議以何因緣令我及一切衆生有受持者得金剛三昧令汝及一切衆生有受持者心得安隱所得功德及其神力如我無異此呪功能我更為説旦起誦呪二十一遍中時二十一遍向暮二十一遍恆持不忘能除五逆重罪又得成就首楞嚴等一切三昧亦得成就一切陀羅尼又得成就一切佛法若能恆常用心誦念不忘常見釋迦牟尼佛普賢菩薩觀世音菩薩及見天女請受佛法若欲造像當畫釋迦牟尼佛坐華座上身黃金色著五彩衣左廂畫普賢菩薩坐須彌山其山左邊有七頭龍繞山於左邊出七箇頭向菩薩看右邊有五頭龍繞山於右邊出五箇頭向菩薩看其菩薩結跏趺坐兩手執經夾讀著五色衣其佛右手作印文左手捉袈裟按膝説法右廂畫觀世音坐華座著白色衣胡跪合掌面向佛看聽佛説法左廂三手一手執華一手捉澡罐一手捉經甲右廂三手一手施無畏出寶一手捉索一手捉珠菩薩頂上有佛又向下作行者胡跪燒香捉珠向菩薩看普賢下作毗陀天女胡跪坐手捧華冠著白衣坐具上向菩薩看其像淨畫不得有膠畫依淨法次説入檀受持法右從白月八日入道場用牛糞塗地方作壇初四肘乃至八肘五色作須十六罐子安水及花果子須十六具香爐十六燈盞若作四肘壇安四罐子四具香爐四枚燈盞飲食種種果子酥密石密燒種種香六時莫絶行者澡浴著淨衣如法唯得食粳米飯粥乳酪酥密果子石密乾薑胡椒畢鉢餘者不得其飲食從八日獻佛乃至十五日不收十六日收送擲水中及火燒却從初入道場八日依對佛壇前更作一肘壇牛糞作取乾穀木及桑木取一片呪一遍放壇中乃至二十一遍竟然後取七種穀子用手取呪一遍著火中乃至二十一遍白日亦得夜暗亦得日別一度至十五日燒勿忘竟十五日夜不得睡眠一心誦呪其夜或時地動或時聞大聲行者莫生驚怪安心誦呪念二菩薩爾時普賢觀世音即為現身語行者言汝須何願隨索皆能滿足若不得相見稱心從十六日除壇更作新壇準前法行道誦呪乃至以得見滿願為限其行者入道場唯得見一人使令共語餘人更不得語不得見行者在道場內亦不得語須語待出道場觀世音普賢陀羅尼法具足
